name: tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: docker
        run: |
          docker compose up -d --build
          docker ps -a
          sleep 20
          docker compose exec -T pg ./run_tests.sh
